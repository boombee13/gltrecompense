<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบรูปภาพและพิกัด</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcfaf8; 
            --table-bg: #ffffff;
            --header-bg: #ffd6c9; 
            --header-text: #5e5c5c;
            --row-hover: #fff3ed; 
            --text-main: #6b6b6b;
            --btn-map: #b5ead7; 
            --btn-map-hover: #9bd6c2;
            --btn-action: #ffbba6;
            --btn-action-hover: #ffa48a;
            --link-color: #a2add0; 
            --tab-bg: #f1f1f1;
            --tab-active: #ffbba6; 
        }
        
        body { font-family: 'Sarabun', sans-serif; padding: 30px 15px; background-color: var(--bg-color); color: var(--text-main); margin: 0; font-size: 15px; }
        h2 { text-align: center; color: #7b7b7b; margin-bottom: 20px; font-weight: 600; }
        
        .tabs-container { display: flex; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn { font-family: 'Sarabun', sans-serif; padding: 10px 24px; border: none; background-color: var(--tab-bg); color: var(--text-main); border-radius: 25px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn:hover { background-color: #e2e2e2; }
        .tab-btn.active { background-color: var(--tab-active); color: white; box-shadow: 0 4px 10px rgba(255, 187, 166, 0.4); }

        .table-container { border-radius: 16px; overflow-x: auto; -webkit-overflow-scrolling: touch; box-shadow: 0 8px 24px rgba(0,0,0,0.04); background: var(--table-bg); max-width: 1100px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 16px 20px; text-align: left; border-bottom: 1px solid #f4f4f4; white-space: nowrap; }
        th { background-color: var(--header-bg); color: var(--header-text); font-weight: 600; font-size: 16px; }
        tr:hover td { background-color: var(--row-hover); }

        a.link-text { color: var(--link-color); text-decoration: none; font-weight: 600; }
        a.link-text:hover { text-decoration: underline; }

        a.btn { display: inline-block; padding: 8px 18px; background: var(--btn-map); color: #5a7065; text-decoration: none; border-radius: 20px; font-size: 14px; font-weight: 600; transition: all 0.3s ease; }
        a.btn:hover { background: var(--btn-map-hover); transform: translateY(-1px); }

        button.btn-action { font-family: 'Sarabun', sans-serif; padding: 8px 18px; background: var(--btn-action); color: white; border: none; border-radius: 20px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        button.btn-action:hover { background: var(--btn-action-hover); transform: translateY(-1px); }
        button.btn-action:disabled { background: #ccc; cursor: not-allowed; transform: none; }
        
        .status-badge { background-color: #f1f1f1; padding: 6px 12px; border-radius: 12px; font-size: 14px; color: #777; }
        
        /* สัญลักษณ์โหลดข้อมูลแอบๆ มุมขวาบน */
        #loadingIndicator { position: fixed; top: 15px; right: 20px; font-size: 13px; color: #aaa; display: none; }
    </style>
</head>
<body>

    <div id="loadingIndicator">🔄 กำลังอัปเดต...</div>
    <h2>✨ ระบบตรวจสอบและจัดการรูปภาพ</h2>
    
    <div class="tabs-container">
        <button class="tab-btn" onclick="filterData('ทั้งหมด', this)">ทั้งหมด (All)</button>
        <button class="tab-btn active" onclick="filterData('รอดำเนินการ', this)">รอดำเนินการ</button>
        <button class="tab-btn" onclick="filterData('Moved', this)">ย้ายแล้ว (Moved)</button>
    </div>
    
    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Link</th>
                    <th>Road</th>
                    <th>Sub District</th>
                    <th>District</th>
                    <th>Province</th>
                    <th>Location</th>
                    <th>Status</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="10" style="text-align:center; padding: 30px;">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        // 🚨 อย่าลืมแก้ API URL ทั้ง 2 ตัวของคุณเหมือนเดิมนะครับ
        const API_URL = 'https://script.google.com/macros/s/AKfycbwoKn0sBWgxZVHenqQJn-ky8ttWxREAoZykk4qnCUMEsBP48KyXhCC2upufaPzlJXo/exec'; 
        const N8N_WEBHOOK_URL = 'https://boombee130.app.n8n.cloud/webhook/trigger-move';

        let allData = []; 
        let currentFilter = 'รอดำเนินการ'; // ตั้งค่า Default Tab
        let processingRows = []; // ตัวแปรเก็บแถวที่กำลังย้าย ป้องกันข้อมูลกระตุก

        // ฟังก์ชันดึงข้อมูล (isAutoRefresh = true จะโหลดแบบเงียบๆ ไม่เคลียร์ตาราง)
        async function fetchData(isAutoRefresh = false) {
            if (isAutoRefresh) {
                document.getElementById('loadingIndicator').style.display = 'block';
            }

            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const getValue = (row, keyName) => {
                    const actualKey = Object.keys(row).find(k => k.trim() === keyName);
                    return actualKey ? row[actualKey] : '';
                };

                allData = data.filter(row => {
                    const dateVal = getValue(row, 'Date');
                    const linkVal = getValue(row, 'Link');
                    return (dateVal !== '' && dateVal !== undefined) || (linkVal !== '' && linkVal !== undefined);
                }).map(row => {
                    return {
                        rowNumber: row['rowNumber'],
                        date: getValue(row, 'Date'),
                        time: getValue(row, 'Time'),
                        link: getValue(row, 'Link'),
                        road: getValue(row, 'Road'),
                        subDistrict: getValue(row, 'Sub District'),
                        district: getValue(row, 'District'),
                        province: getValue(row, 'Province'),
                        location: getValue(row, 'Location'),
                        status: getValue(row, 'Status') || 'รอดำเนินการ'
                    };
                });

                applyCurrentFilter(); // อัปเดตตารางตาม Tab ปัจจุบัน
            } catch (error) {
                console.error("Fetch Error:", error);
            } finally {
                if (isAutoRefresh) {
                    setTimeout(() => document.getElementById('loadingIndicator').style.display = 'none', 1000);
                }
            }
        }

        // ฟังก์ชันสร้างตาราง
        function renderTable(dataToRender) {
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = ''; 

            if (dataToRender.length === 0) {
                 tbody.innerHTML = `<tr><td colspan="10" style="text-align:center; padding: 40px; color: #aaa;">ไม่มีข้อมูลในสถานะ ${currentFilter}</td></tr>`;
                 return;
            }

            dataToRender.forEach(row => {
                const tr = document.createElement('tr');
                const linkImg = row.link ? `<a href="${row.link}" class="link-text" target="_blank">ดูรูปภาพ</a>` : '-';
                const linkMap = row.location ? `<a href="${row.location}" class="btn" target="_blank">เปิด Google Maps</a>` : '-';
                
                // ระบบเช็กสถานะล็อกปุ่ม
                const isMoved = (row.status.toLowerCase() === 'moved' || row.status === 'ย้ายแล้ว' || row.status === 'reported');
                const isProcessing = processingRows.includes(row.rowNumber.toString());

                let actionBtn = '';
                if (isMoved) {
                    actionBtn = `<span style="color: #aaa; font-size: 13px;">เสร็จสิ้น</span>`;
                    // ปลดล็อกแถวเมื่อย้ายเสร็จจริงใน Sheet
                    if (isProcessing) {
                        processingRows = processingRows.filter(r => r !== row.rowNumber.toString());
                    }
                } else if (isProcessing) {
                    actionBtn = `<span style="color: #f39c12; font-size: 13px; font-weight: 600;">กำลังดำเนินการ...</span>`;
                } else {
                    actionBtn = `<button class="btn-action" onclick="triggerMove('${row.rowNumber}', this)">สั่งย้าย</button>`;
                }

                tr.innerHTML = `
                    <td>${row.date || '-'}</td>
                    <td>${row.time || '-'}</td>
                    <td>${linkImg}</td>
                    <td>${row.road || '-'}</td>
                    <td>${row.subDistrict || '-'}</td>
                    <td>${row.district || '-'}</td>
                    <td>${row.province || '-'}</td>
                    <td>${linkMap}</td>
                    <td><span class="status-badge status-text">${row.status}</span></td>
                    <td>${actionBtn}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // ฟังก์ชันแสดงข้อมูลตาม Tab
        function applyCurrentFilter() {
            if (currentFilter === 'ทั้งหมด') {
                renderTable(allData);
            } else {
                // กรองข้อมูล (รองรับคำว่า Moved และ ย้ายแล้ว ให้เป็นกลุ่มเดียวกัน)
                const filteredData = allData.filter(row => {
                    if (currentFilter === 'Moved') {
                        return row.status.toLowerCase() === 'moved' || row.status === 'ย้ายแล้ว' || row.status === 'reported';
                    }
                    return row.status === currentFilter;
                });
                renderTable(filteredData);
            }
        }

        // เมื่อผู้ใช้กดคลิกเปลี่ยน Tab
        function filterData(statusFilter, btnElement) {
            currentFilter = statusFilter;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            applyCurrentFilter();
        }

        // เมื่อกดสั่งย้าย
        async function triggerMove(rowNumber, btnElement) {
            processingRows.push(rowNumber.toString()); // ล็อกแถวนี้ไว้
            btnElement.outerHTML = `<span style="color: #f39c12; font-size: 13px; font-weight: 600;">กำลังสั่ง...</span>`;

            try {
                await fetch(`${N8N_WEBHOOK_URL}?row=${rowNumber}`, { mode: 'no-cors' });
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการสั่งงาน n8n");
                processingRows = processingRows.filter(r => r !== rowNumber.toString()); // ปลดล็อกถ้าเกิด Error
                fetchData(true);
            }
        }

        // ทำงานเมื่อเปิดเว็บครั้งแรก
        fetchData();

        // 🚨 สั่งให้แอบโหลดข้อมูลใหม่ (Auto-Refresh) ทุกๆ 12 วินาที
        setInterval(() => {
            fetchData(true);
        }, 12000);

    </script>
</body>
</html>
